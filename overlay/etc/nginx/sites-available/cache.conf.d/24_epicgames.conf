  # ===========================================================================
  # Epic Games / Fortnite CDN tuning  (upstream lancachenet/monolithic#192)
  # ===========================================================================
  # Included by the main cache `server { … }` block via:
  #     include /etc/nginx/sites-available/cache.conf.d/*.conf;
  # So directives here live in `server` context — `map` / `js_*` are NOT valid.
  #
  # Why this file exists
  # --------------------
  # LANCache caches HTTP only; HTTPS is SNI-proxied untouched. The Epic launcher
  # sometimes negotiates HTTPS CDN endpoints, in which case every chunk bypasses
  # the cache and shows up as a permanent MISS.
  # The client-side mitigation is `[Launcher] ForceNonSslCdn=false` in
  # Engine.ini  (see contrib/lancache-epic-fix.ps1).
  #
  # On the server side we do two things:
  #   1. Always: tighten cache behaviour for Epic CDN hosts (no slice nonsense
  #      around update-deltas) so the cacheable HTTP traffic that DOES reach us
  #      is held longer and not invalidated by the 30s client timeout — the
  #      base `proxy_cache_lock_age 15s` is already set in 20_cache.conf for #192.
  #   2. When EPIC_FORCE_NOSLICE=true: proactively route Epic CDN hosts to the
  #      `@noslice` named location (defined in 15_noslice.conf).
  #      This avoids waiting for the noslice detector to learn the host the
  #      hard way via repeated "invalid range in slice response" errors.
  #
  # Template substitution
  # ---------------------
  # The literal token `EPIC_FORCE_NOSLICE` below is replaced at container
  # startup by `overlay/hooks/entrypoint-pre.d/10_setup.sh` with the env-var
  # value, either the string `true` or the string `false`:
  #     sed -i "s/EPIC_FORCE_NOSLICE/${EPIC_FORCE_NOSLICE}/" \
  #         /etc/nginx/sites-available/cache.conf.d/24_epicgames.conf
  #
  # nginx `if`-is-evil note
  # -----------------------
  # `if` in `server` context is generally unsafe, but it is safe for the two
  # uses below because we only call `set` and `error_page`/`return` — the same
  # pattern used by `cache.conf.d/root/05_noslice_routing.conf.disabled`.
  # ===========================================================================

  # Per-server toggle, populated from the EPIC_FORCE_NOSLICE env var at startup.
  set $epic_force_noslice EPIC_FORCE_NOSLICE;

  # Match the published Epic CDN hostnames:
  #   *.epicgamescdn.com   (covers cloudflare.epicgamescdn.com too)
  #   download.epicgames.com
  #   epicgames-download1.akamaized.net
  #   fastly-download.epicgames.com
  set $epic_match 0;
  if ($host ~* "(^|\.)epicgamescdn\.com$") { set $epic_match 1; }
  if ($host = "download.epicgames.com")     { set $epic_match 1; }
  if ($host = "epicgames-download1.akamaized.net") { set $epic_match 1; }
  if ($host = "fastly-download.epicgames.com")     { set $epic_match 1; }

  # Combine: route to @noslice only when BOTH the host matches an Epic CDN
  # AND the operator opted in via EPIC_FORCE_NOSLICE=true. We encode the
  # combination as a single string compare to avoid stacked `if` blocks.
  set $epic_route "${epic_force_noslice}:${epic_match}";

  # Epic-specific cache tuning. This is a dedicated location that wins over
  # the generic `location /` because it matches the Epic hosts and uses a
  # named-location detour via error_page (the @noslice route is defined in
  # 15_noslice.conf; we never define @noslice ourselves).
  # Proactive route: skip the slice filter entirely for known-bad CDNs.
  # The error_page 460 = @noslice trick mirrors 05_noslice_routing.conf.
  # NOTE: `error_page` must live at server context — nginx rejects it inside
  # an `if` block ("error_page directive is not allowed here").
  error_page 460 = @noslice;
  if ($epic_route = "true:1") {
    return 460;
  }
