load_module modules/ngx_http_js_module.so;
env NOSLICE_FALLBACK;
env NOSLICE_THRESHOLD;
env NOSLICE_DETECT_MODE;
env NOSLICE_SCAN_INTERVAL;
env NOSLICE_ERROR_LOG;
events {}
http {
  js_path /tmp/wA/njs/;
  js_import lancache from lancache.js;
  js_shared_dict_zone zone=lancache:2m type=number;
  js_set $noslice_host lancache.nosliceHost;

  server {
    listen 127.0.0.1:8083;
    location @lancache_periodics {
      js_periodic lancache.scanErrorLog interval=2s;
      js_periodic lancache.decayCounts  interval=1h;
      js_periodic lancache.heartbeat    interval=1h;
    }
    location / { return 444; }
  }

  server {
    listen 8080;
    location = /lancache-internal/noslice { js_content lancache.nosliceStatus; }
    location = /lancache-internal/noslice/reset { js_content lancache.nosliceReset; }
    location = /_host { return 200 "$noslice_host\n"; }
  }
}
