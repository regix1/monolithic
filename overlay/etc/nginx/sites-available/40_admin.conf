# Admin panel SPA
# Serves the built React frontend on port 8081
# API requests are proxied to the Go backend when it's available

server {
  listen 8081 reuseport;
  root /var/www/admin;
  index index.html;

  # SPA: serve index.html for all non-file routes
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Cache static assets aggressively
  location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
    expires 30d;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # API proxy — forwarded to Go backend when available
  location /api/ {
    proxy_pass http://127.0.0.1:8082;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_connect_timeout 2s;
    proxy_read_timeout 10s;

    # Return 502 gracefully if backend isn't running yet
    error_page 502 = @api_fallback;
  }

  # WebSocket support
  location /api/ws {
    proxy_pass http://127.0.0.1:8082;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_read_timeout 86400s;

    error_page 502 = @api_fallback;
  }

  # Fallback when Go backend isn't running
  location @api_fallback {
    default_type application/json;
    return 503 '{"error":"admin backend not running"}';
  }

  access_log off;
}
