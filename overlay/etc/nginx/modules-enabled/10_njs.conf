# Load the njs HTTP module so the noslice/heartbeat runtime in /etc/nginx/njs/
# is available. Installed by `apk add nginx-module-njs` in the Dockerfile.
# Without this, every `js_*` directive (js_path, js_import, js_shared_dict_zone,
# js_set, js_periodic, js_content, js_header_filter) is an unknown directive.
load_module modules/ngx_http_js_module.so;

# Pass our runtime knobs through to the nginx worker environment so njs can
# read them via `process.env.*`. By default nginx wipes the env when spawning
# workers; without these `env` lines, `process.env.NOSLICE_FALLBACK` etc. are
# undefined and the noslice runtime stays in its "disabled" no-op path.
# `env` must be declared in main context — we're included from nginx.conf
# before the `events { }` block opens, which puts us exactly there.
env NOSLICE_FALLBACK;
env NOSLICE_THRESHOLD;
env NOSLICE_DETECT_MODE;
env NOSLICE_SCAN_INTERVAL;
env NOSLICE_STATIC_HOSTS;
env NOSLICE_ERROR_LOG;
env DECAY_INTERVAL;
