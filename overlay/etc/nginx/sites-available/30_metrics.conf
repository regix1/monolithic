# Metrics endpoint + lancache-internal HTTP surface.
#
# This :8080 server is bound by the Dockerfile's symlink into sites-enabled.
# It exposes:
#
#   GET  /nginx_status                       stub_status (existing)
#   GET  /lancache-internal/noslice          njs nosliceStatus
#   POST /lancache-internal/noslice/reset    njs nosliceReset
#
# The /lancache-internal/* endpoints are locked to 127.0.0.1 — only the Go
# admin backend (running in the same container) consumes them. nothing on the
# public LAN should hit them, even though :8080 is EXPOSEd on the container
# (it carries nginx_status too).

server {
  listen 8080 reuseport;

  location = /nginx_status {
    stub_status on;
    access_log off;
  }

  # Read the current noslice state. Returns the §4 JSON shape verbatim — the
  # admin backend decodes this into typed structs (no map[string]interface{}).
  location = /lancache-internal/noslice {
    allow 127.0.0.1;
    deny  all;
    access_log off;
    js_content lancache.nosliceStatus;
  }

  # Clear every `nsfail:` / `nslast:` / `nsblock:` key and re-anchor the
  # error-log offset to the current end-of-file. Used by reset-noslice.sh
  # (a thin POST wrapper) and the admin UI's Reset button.
  location = /lancache-internal/noslice/reset {
    allow 127.0.0.1;
    deny  all;
    access_log off;
    js_content lancache.nosliceReset;
  }
}
