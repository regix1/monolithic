# njs runtime wiring for the noslice/heartbeat core.
#
# `lancache.js` is the single entry module — it imports + re-exports from
# `noslice.js` and `heartbeat.js`. The shared dict is the one place state lives;
# `state=/data/noslice.dict` persists it across container restarts and reloads
# it automatically on startup (njs 0.8.0+).
#
# The contract: zone name `lancache`, keys
# `nsfail:<host>`, `nslast:<host>`, `nsblock:<host>`, `__ns_offset`, `__ns_decay`.

js_path /etc/nginx/njs/;

js_import lancache from lancache.js;

# 2 MiB sized generously. `type=number` allows atomic
# `.incr()` on `nsfail:*` from the periodic scanner and Design B header filter.
js_shared_dict_zone zone=lancache:2m type=number state=/data/noslice.dict;

# `$noslice_host` becomes a live js_set variable, computed per request from the
# shared dict. This replaces the old generated `map` block and eliminates the
# `nginx -s reload` the legacy detector fired whenever a host crossed threshold.
js_set $noslice_host lancache.nosliceHost;
