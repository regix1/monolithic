load_module modules/ngx_http_js_module.so;
events {}
http {
  js_path /tmp/wA/njs/;
  js_import lancache from lancache.js;
  js_shared_dict_zone zone=lancache:2m type=number;
  js_set $noslice_host lancache.nosliceHost;
  server {
    listen 127.0.0.1:8083;
    location @lancache_periodics {
      js_periodic lancache.scanErrorLog interval=10s;
      js_periodic lancache.decayCounts  interval=1h;
      js_periodic lancache.heartbeat    interval=30s;
    }
    location / { return 444; }
  }
  server {
    listen 8080;
    location = /nginx_status { stub_status on; }
    location = /lancache-internal/noslice {
      allow 127.0.0.1; deny all;
      js_content lancache.nosliceStatus;
    }
    location = /lancache-internal/noslice/reset {
      allow 127.0.0.1; deny all;
      js_content lancache.nosliceReset;
    }
  }
  server {
    listen 80;
    location / {
      js_header_filter lancache.nosliceHeaderFilter;
      return 200 "ok\n";
    }
  }
}
