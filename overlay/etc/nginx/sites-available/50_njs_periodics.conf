# njs periodic tasks — single-writer, worker-0 only.
#
# `js_periodic` ONLY ticks on nginx worker process 0 by default (njs 0.8.1+).
# That gives us a guaranteed single writer for the
# error-log scan, the decay sweep, and the heartbeat — no shared-dict races, no
# duplicate work. Do NOT add `worker_affinity`; relying on the documented
# default is intentional.
#
# This server only exists to anchor the `location @lancache_periodics` block,
# which is the only `location` context where `js_periodic` is valid. It listens
# on a localhost-only loopback port and serves nothing publicly.

server {
  listen 127.0.0.1:8083;
  server_name _;
  access_log off;

  location @lancache_periodics {
    # Design A — incremental error-log scan: read ONLY new bytes since the
    # offset stored in `__ns_offset`. NOSLICE_SCAN_INTERVAL controls cadence.
    js_periodic lancache.scanErrorLog interval=NOSLICE_SCAN_INTERVAL;

    # Decay: drop one off `nsfail:*` for hosts that haven't erred in
    # DECAY_INTERVAL seconds. Runs every hour — cheap enough.
    js_periodic lancache.decayCounts interval=1h;

    # Heartbeat: ngx.fetch the local heartbeat URL every BEAT_TIME, mirroring
    # the retired heartbeat.sh while running inside the nginx worker (no
    # subprocess, no shell loop).
    js_periodic lancache.heartbeat interval=BEAT_TIME;
  }

  # Anything else on :8083 is a no-op — the location above is invoked by the
  # periodics scheduler, not by a client request.
  location / { return 444; }
}
